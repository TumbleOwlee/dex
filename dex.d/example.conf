# dex per-project configuration example
# Copy this file to ~/.dex.d/<descriptive-name>.conf and edit it.
#
# Files in ~/.dex.d/ are scanned in alphabetical order; the first file
# whose 'pattern' (a bash ERE regex) matches the current git repository root
# path is used. This lets one config cover all worktrees of a project.
#
# Alias precedence (highest wins):
#   global profile alias
#     < project profile-scoped alias  ([alias:<name>] after a [<profile>] header)
#       < project unscoped alias      ([alias:<name>] before any profile header)
#
# Alias env is always overwritten (never merged) when defined in the project config.

# ──────────────────────────────────────────────────────────────────────────────
# [project] — mandatory section
# ──────────────────────────────────────────────────────────────────────────────
[project]
# Bash ERE regex matched against the absolute path of the git root.
# Use (/.*)?$ at the end to also match paths *inside* the repo.
pattern = .*/Github/myproject(/.*)?

# Profile from ~/.dex.conf to use (default: "default")
profile = default

# Optional: override the profile's image for this project only.
# Uncomment one of the following:
#image = myorg/custom-image:1.2.3

# Optional: build the container image from a local Dockerfile.
# Relative paths are resolved relative to this config file's directory.
# The built image is tagged as "dex-<project-slug>:local".
# It is built automatically the first time (or when --rebuild is passed).
#dockerfile = Dockerfile.dev
#dockerfile = /home/user/.dex.d/myproject.Dockerfile

# ──────────────────────────────────────────────────────────────────────────────
# Unscoped aliases — appear before any profile header
# These take the highest precedence; they overwrite the active profile's alias
# regardless of which profile is selected.
# ──────────────────────────────────────────────────────────────────────────────

[alias:configure]
# Project-specific CMake flags — overrides the profile's 'configure' alias.
cmd     = cmake -S /workspace -B /workspace/build -DMYPROJECT_ENABLE_TESTS=ON
workdir = /workspace

[alias:lint]
# Run the project's linter (not defined in the base profile)
cmd     = clang-tidy -p /workspace/build $(find /workspace/src -name '*.cpp')
workdir = /workspace

# ──────────────────────────────────────────────────────────────────────────────
# Profile-scoped aliases and profile overrides
#
# Place a [<profile-name>] header to scope what follows to that profile.
# This lets you override profile settings and define aliases only for certain
# profiles.  It also lets you define entirely new profiles that only exist for
# this project (not in the global config).
# ──────────────────────────────────────────────────────────────────────────────

# Override the 'default' profile's image and a single alias for this project.
[default]
image = myorg/custom-image:1.2.3    # optional: overrides global profile image
# Optional: override port mappings for this profile in this project only.
#ports = 8080:8080,5432:5432

[alias:test]
# Replaces the global 'default' profile's 'test' alias for this project.
# env supports four forms:
#   KEY            — pass the host value of KEY (skipped if unset)
#   KEY=VALUE      — fixed value
#   KEY=$(cmd)     — evaluate cmd on the host at run time
#   KEY=`cmd`      — same, backtick style
cmd     = ctest --test-dir /workspace/build --output-on-failure -j4
workdir = /workspace/build
env     = CTEST_OUTPUT_ON_FAILURE=1,MYPROJECT_TEST_DATA=/workspace/testdata,BRANCH=$(git branch --show-current)

# Define a project-only profile (does not need to exist in the global config).
#[myprofile]
#image = myorg/special:1.0
#env   = SPECIAL=1
#
#[alias:build]
#cmd = make -C build
